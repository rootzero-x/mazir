<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A5CFF"/>
      <stop offset="100%" stop-color="#003B9E"/>
    </linearGradient>

    <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F7FF"/>
      <stop offset="50%" stop-color="#C8D0E5"/>
      <stop offset="100%" stop-color="#8A93A8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#000000"/>

  <!-- Diamond Top -->
  <polygon points="256,70 350,160 256,250 162,160"
           fill="url(#silverGrad)"/>

  <polygon points="256,70 350,160 256,250"
           fill="url(#blueGrad)"/>

  <!-- Left Pillar -->
  <path d="M110 420
           V260
           L210 190
           L256 230
           V420
           Z"
        fill="url(#blueGrad)"/>

  <!-- Right Pillar -->
  <path d="M402 420
           V260
           L302 190
           L256 230
           V420
           Z"
        fill="url(#silverGrad)"/>

</svg>
